<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse past Deduction Puzzle cases. Each case is playable in practice mode with no time pressure.">
  <title>Case Archive | Deduction Puzzle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/archive.css">
</head>
<body>
  <div id="app">
    <header class="archive-header">
      <a href="/" class="header-home-link">
        <span class="logo">Deduction</span>
      </a>
      <span class="archive-title-badge">Case Archive</span>
    </header>

    <main class="archive-main">
      <div class="archive-top">
        <h1 class="archive-heading">Past Cases</h1>
        <p class="archive-sub">All past cases are playable in practice mode. The timer is removed and you can take your time.</p>
      </div>

      <div class="archive-filters" role="group" aria-label="Filter cases">
        <button class="filter-btn active" data-filter="all" type="button">All</button>
        <button class="filter-btn" data-filter="easy" type="button">Easy</button>
        <button class="filter-btn" data-filter="medium" type="button">Medium</button>
        <button class="filter-btn" data-filter="hard" type="button">Hard</button>
        <button class="filter-btn" data-filter="theft" type="button">Theft</button>
        <button class="filter-btn" data-filter="deception" type="button">Deception</button>
        <button class="filter-btn" data-filter="alibi" type="button">Alibi</button>
        <button class="filter-btn" data-filter="murder" type="button">Murder</button>
      </div>

      <div id="case-grid" class="case-grid" aria-live="polite">
        <div class="archive-loading">
          <div class="loading-spinner" aria-hidden="true"></div>
          <p class="loading-text">Loading cases...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="js/archive.js"></script>
</body>
</html>
